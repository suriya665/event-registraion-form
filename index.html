<!DOCTYPE html>
<html>
<head>
    <title>Event Registration Form</title>
</head>
<body>

<h2>Event Registration Form</h2>

<form>

<label>Full Name:</label>
<input type="text" name="name" required><br><br>
<label>Register Number:</label>
<input type="text" name="regno" required><br><br>

<label>Email:</label>
<input type="email" name="email" required><br><br>

<label>Phone Number:</label>
<input type="tel" name="phone" required><br><br>

<label>Age:</label>
<input type="number" name="age" required><br><br>


<label>Gender:</label>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other
<br><br>

<label>Select Event:</label>
<select name="event">
    <option>Technical Workshop</option>
    <option>Coding Contest</option>
    <option>Music Competition</option>
    <option>Sports Event</option>
</select>
<br><br>
<label>Department:</label>
<select name="department" required>
    <option value="">--Select Department--</option>
    <option value="B.Tech IT">B.Tech IT</option>
    <option value="B.Tech CSE">B.Tech CSE</option>
    <option value="B.E CSE">B.E CSE</option>
    <option value="B.E ECE">B.E ECE</option>
    <option value="B.E EEE">B.E EEE</option>
    <option value="B.E ME">B.E ME</option>
    <option value="B.E CE">B.E CE</option>
</select>
<br><br>

<label>College/Organization:</label>
<input type="text" name="college"><br><br>

<label>Address:</label><br>
<textarea name="address" rows="4" cols="30"></textarea>
<br><br>

<label>
<input type="checkbox" required>
I agree to the Terms and Conditions
</label>
<br><br>

<input type="submit" value="Register">
<input type="reset" value="Clear">

</form>
</body>
</html>
